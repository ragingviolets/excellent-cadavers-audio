<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excellent Cadavers — Soundtrack</title>
  <style>
    :root {
      --bg: #140000;
      --bg2: #2b0000;
      --text: #d15c02;
      --muted: #a65a1a;
      --accent: #7a2d00;
      --accent2: #d15c02;
      --border: rgba(209, 92, 2, 0.18);
      --card: rgba(255, 120, 40, 0.04);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(120, 0, 0, 0.35), transparent 35%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      min-height: 100vh;
    }

    .wrap {
      width: min(900px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 60px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(209, 92, 2, 0.25);
    }

    .section-title {
      margin: 34px 0 14px;
      font-size: 1.35rem;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .track-list {
      display: grid;
      gap: 16px;
    }

    .track {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
    }

    .track h3 {
      margin: 0 0 6px;
      font-size: 1.15rem;
    }

    .track p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.98rem;
    }

    audio {
      width: 100%;
      display: block;
      margin-bottom: 10px;
    }

    .download-link {
      color: #ff9a4d;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 154, 77, 0.35);
    }

    .download-link:hover {
      color: #ffd9b3;
      border-bottom-color: rgba(255, 217, 179, 0.7);
    }

    footer {
      margin-top: 40px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Excellent Cadavers</h1>
    </header>

    <h2 class="section-title">All Tracks</h2>
    <div class="track-list">

      <section class="track">
        <h3>Come On</h3>
        <p>comeon.mp3</p>
        <audio controls preload="none">
          <source src="comeon.mp3" type="audio/mpeg" />
        </audio>
        <a class="download-link" href="comeon.mp3" target="_blank">Open track in a new tab</a>
      </section>

      <section class="track">
        <h3>Counting Stars</h3>
        <p>countingstars.mp3</p>
        <audio controls preload="none">
          <source src="countingstars.mp3" type="audio/mpeg" />
        </audio>
        <a class="download-link" href="countingstars.mp3" target="_blank">Open track in a new tab</a>
      </section>

      <section class="track">
        <h3>Tarantella</h3>
        <p>comeon.mp3</p>
        <audio controls preload="none">
          <source src="tarantella.mp3" type="audio/mpeg" />
        </audio>
        <a class="download-link" href="comeon.mp3" target="_blank">Open track in a new tab</a>
      </section>

     <section class="track">
        <h3>Take Me Back</h3>
        <p>comeon.mp3</p>
        <audio controls preload="none">
          <source src="takemeback.mp3" type="audio/mpeg" />
        </audio>
        <a class="download-link" href="comeon.mp3" target="_blank">Open track in a new tab</a>
      </section>

      <!-- COPY THIS BLOCK FOR MORE TRACKS -->

    </div>

    <footer>
      <div>Hosted on GitHub Pages</div>
    </footer>
  </div>
</body>
</html>
